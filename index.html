//to formate the date to dd-mm-yyy
function formatDateDMY(dateStr) {
  if (!dateStr) return "";

  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;

  const day = String(d.getDate()).padStart(2, "0");
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const year = d.getFullYear();

  return `${day}-${month}-${year}`;
}

window.exportPDF = function () {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Cause List Portal Report", 14, 10);

  const rows = [];

  document.querySelectorAll("#tableBody tr").forEach(tr => {
    const cols = tr.querySelectorAll("td");

    rows.push([
      cols[0]?.innerText, // Sl No
      cols[1]?.innerText, // Case No
      cols[2]?.innerText, // Section
      cols[3]?.innerText, // Accused
      cols[4]?.innerText, // Counsels
      cols[5]?.innerText, // Status
      formatDateDMY(cols[6]?.innerText),
      cols[7]?.innerText, // Court âœ… FIXED
      cols[8]?.innerText  // District
    ]);
  });

  doc.autoTable({
    head: [[
      "Sl No",
      "Case No",
      "Section",
      "Accused",
      "Counsels",
      "Status",
      "Date",
      "Court",
      "District"
    ]],
    body: rows
  });

  doc.save("cause-list.pdf");
};

window.saveRecord = async () => {
  const district = document.getElementById("district").value;
  const court = document.getElementById("court").value;
  const case_no = document.getElementById("case_no").value;
  const section_detail = document.getElementById("section_detail").value;
  const accused = document.getElementById("accused").value;
  const counsels = document.getElementById("counsels").value;
  const status = document.getElementById("status").value;
  const hearing_date = document.getElementById("hearing_date").value;
  const id = document.getElementById("recordId").value;

  // ❌ VALIDATION CHECK
  if (!district || !court || !case_no || !section_detail || !accused || !status || !hearing_date) {
    alert("⚠️ Please fill all required fields before saving!");
    return;
  }

  const row = {
    district,
    court,
    case_no,
    section_detail,
    accused,
    counsels,
    status,
    hearing_date
  };

  let result;
  if (id) {
    result = await supabaseClient.from("cases").update(row).eq("id", id);
  } else {
    result = await supabaseClient.from("cases").insert([row]);
  }

  if (result.error) return alert(result.error.message);

  clearForm();
  loadCases();
};

// Auto logout after 5 minutes of inactivity
let inactivityTimer;

function resetInactivityTimer() {
    clearTimeout(inactivityTimer);

    inactivityTimer = setTimeout(async () => {
        const { data } = await supabaseClient.auth.getUser();

        if (data.user) {
            await supabaseClient.auth.signOut();
            alert("Logged out due to 5 minutes of inactivity.");
            location.reload();
        }
    }, 5 * 60 * 1000);
}

[

    "click"
].forEach(event => {
    document.addEventListener(event, resetInactivityTimer, true);
